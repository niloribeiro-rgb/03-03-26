<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pedido</title>
    <link rel="stylesheet" href="../css/style1.css">
    <link rel="stylesheet" href="../css/animated-gradient-background.css">
</head>

<body>
    <section>
    <h1>Pedido</h1>
    <hr>
    <label for="nome">Nome do cliente</label>
    <input type="text" id="nome">
    <br>
    <label for="data">Data do pedido</label>
    <input type="date" id="data">
    <br>
    <label for="produto">produto</label>
    <select id="produto">
        <option value="notebook">Notebook</option>
        <option value="mouse">Mouse</option>
        <option value="pc">Pc</option>
    </select>
    <br>
    <br>
    <fieldset>
        <legend>Forma de pagamento:</legend>
    <input type="radio" name="pagamento" id="pagamento" value="credito">Cartao de credito</input> <br>
    <input type="radio" name="pagamento" id="pagamento" value="dedito">Cartao de dedito</input> <br>
    <input type="radio" name="pagamento" id="pagamento" value="pix">Pix</input> <br>
    </fieldset>
    <br>
    <label for="pagamento">Serviços extras:</label> <br>
    <input type="checkbox" name="pagamento" id="pagamento" value="credito">Garantia extendida</input> <br>
    <input type="checkbox" name="pagamento" id="pagamento" value="dedito">Frete expresso</input> 
   
    
    <br>

    <br>
    <a href="../index.html">Pedir</a>
    </section>
</body>


</html>
