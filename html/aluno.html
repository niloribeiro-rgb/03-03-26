<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cadastrar como aluno</title>
    <link rel="stylesheet" href="../css/style1.css">
</head>

<body>
    <section>
        <h1>Cadastro de aluno</h1>
        <hr>
        <label for="nome">Nome</label>
        <input type="text" id="nome">
        <br>
        <label for="email">Email</label>
        <input type="email" id="email">
        <br>
        <label for="nascimento">nascimento</label>
        <input type="date" id="nascimento">
        <br>
        <label for="sexo">Sexo:</label> <br>
        <input type="radio" name="sexo" id="sexo" value="masculino">Masculino</input> <br>
        <input type="radio" name="sexo" id="sexo" value="feminino">feminino</input> <br>
        <input type="radio" name="sexo" id="sexo" value="outro">outro</input>
        <br>
        <label for="curso">Curso</label>
        <select id="curso">
            <option value="">Informatica</option>
            <option value="">Mecanica</option>
            <option value="">Administração</option>
        </select>
        <br>
        <label for="interesses">Interesses:</label> <br>
        <input type="checkbox" name="interesses" id="interesses" value="progamacao">progamação</input> <br>
        <input type="checkbox" name="interesses" id="interesses" value="design">Design</input> <br>
        <input type="checkbox" name="interesses" id="interesses" value="robotica">Robotica</input>

<br>
        <br>
        <a href="../html/index.html">Cadastrar</a>
    </section>
</body>


</html>
